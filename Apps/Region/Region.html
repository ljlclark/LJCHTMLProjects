<!DOCTYPE html>
<html>
<head>
  <title>Testing</title>
  <link href="../../Core/Common/CSS/CodeDoc.css" rel="stylesheet"
        type="text/css" />
  <script src="../../Core/Common/script/LJCCommon.js"></script>
  <script src="Table.js"></script>
  <style>

    table.List {
      width: 100%;
      border: 1px solid black;
      border-spacing: 0px;
    }

    td.List {
      border: 1px solid black;
      padding: 2px;
    }

    th.List {
      background-color: lavender;
      border: 1px solid black;
      padding: 2px;
    }

    .TableHeading {
      background-color: lightskyblue;
      border: 1px solid black;
      padding: 2px;
    }
  </style>
  <script>
    function SetColumns(table)
    {
      let tableColumnCount = Table.ColumnCount(cityList);

      // Add column to end of table.
      Table.AddColumn(cityList);
      let addColumnIndex = tableColumnCount;

      // Insert column before last existing column.
      //let insertColumnIndex = tableColumnCount - 1;
      //Table.InsertColumn(cityList, insertColumnIndex);
      //let addColumnIndex = insertColumnIndex;

      // Evently distribute column width.
      tableColumnCount = Table.ColumnCount(cityList);
      let tableWidth = Table.Width(cityList);

      // Allow for last column of 50 px.
      let addColumnWidth = 50;
      let adjustedWidth = tableWidth - addColumnWidth;
      let columnWidth = adjustedWidth / tableColumnCount;

      let fullRow = Table.FullRow(cityList);
      let rowIndex = fullRow.rowIndex;
      for (let columnIndex = 0; columnIndex < tableColumnCount; columnIndex++)
      {
        Table.SetColumnWidth(cityList, rowIndex, columnIndex, columnWidth);
        if (columnIndex == addColumnIndex)
        {
          Table.SetColumnWidth(cityList, rowIndex, columnIndex
            , addColumnWidth);
        }
      }
    }
  </script>
</head>
<body>
  <div class="page">
    <br />
    <table id="cityList" class="List">
      <tr>
        <td class="TableHeading" colspan="3">City</td>
      </tr>
      <tr>
        <th class="List">First</th>
        <th class="List">Second</th>
        <th class="List">Third</th>
      </tr>
      <tr>
        <td class="List">One</td>
        <td class="List">Two</td>
        <td class="List">Three</td>
      </tr>
    </table>
    <table class="List">
      <tr class="TableHeading">
        <td class="List" colspan="3">Barangay</td>
      </tr>
      <tr>
        <th class="List">First</th>
        <th class="List">Second</th>
        <th class="List">Third</th>
      </tr>
      <tr>
        <td class="List">One</td>
        <td class="List">Two</td>
        <td class="List">Three</td>
      </tr>
    </table>
  </div>
  <script>
    SetColumns();
  </script>
</body>
</html>
